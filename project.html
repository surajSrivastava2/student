<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Student Companion</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .box { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input { display: block; width: 100%; margin: 10px 0; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        #quizDisplay { background: #eee; padding: 15px; margin-top: 10px; white-space: pre-wrap; }
    </style>
</head>
<body>

    <div class="box" id="authSection">
        <div id="loginForm">
            <h2>Login</h2>
            <input type="email" id="email" placeholder="Email (test@test.com)">
            <input type="password" id="pass" placeholder="Password (123)">
            <button onclick="login()">Login</button>
            <p onclick="toggleAuth()" style="color:blue; cursor:pointer;">Don't have an account? Sign Up</p>
        </div>

        <div id="signupForm" style="display:none;">
            <h2>Sign Up</h2>
            <input type="text" id="newName" placeholder="Full Name">
            <input type="email" id="newEmail" placeholder="Email">
            <input type="password" id="newPass" placeholder="Password">
            <button onclick="signup()">Create Account</button>
            <p onclick="toggleAuth()" style="color:blue; cursor:pointer;">Already have an account? Login</p>
        </div>
    </div>

    <div id="mainApp" style="display:none;">
        <div class="box">
            <h2>AI Tutor (Chat)</h2>
            <input type="text" id="chatInput" placeholder="Ask anything...">
            <button onclick="askAI()">Ask AI</button>
            <div id="chatBox"></div>
        </div>

        <div class="box">
            <h2>AI Quiz Generator</h2>
            <input type="text" id="quizTopic" placeholder="Enter topic (e.g. Physics)">
            <button onclick="getQuiz()">Generate Quiz</button>
            <div id="quizDisplay">Your quiz will appear here...</div>
        </div>
    </div>

    <script>
        const BASE_URL = "https://student-ygb9.onrender.com/api";

        function toggleAuth() {
            const l = document.getElementById('loginForm');
            const s = document.getElementById('signupForm');
            l.style.display = l.style.display === "none" ? "block" : "none";
            s.style.display = s.style.display === "none" ? "block" : "none";
        }

        async function signup() {
            const name = document.getElementById('newName').value;
            const email = document.getElementById('newEmail').value;
            const password = document.getElementById('newPass').value;
            const res = await fetch(`${BASE_URL}/signup`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name, email, password })
            });
            const data = await res.json();
            alert(data.message);
            if(data.success) toggleAuth();
        }

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;
            const res = await fetch(`${BASE_URL}/login`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            if(data.success) {
                alert("Login Success!");
                document.getElementById('authSection').style.display = "none";
                document.getElementById('mainApp').style.display = "block";
            } else { alert(data.message); }
        }

        async function askAI() {
            const msg = document.getElementById('chatInput').value;
            const res = await fetch(`${BASE_URL}/chat`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ message: msg })
            });
            const data = await res.json();
            document.getElementById('chatBox').innerHTML += `<p><b>You:</b> ${msg}<br><b>AI:</b> ${data.reply}</p>`;
        }

        async function getQuiz() {
            const topic = document.getElementById('quizTopic').value;
            document.getElementById('quizDisplay').innerText = "Generating...";
            const res = await fetch(`${BASE_URL}/quiz`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ topic })
            });
            const data = await res.json();
            document.getElementById('quizDisplay').innerText = data.quiz;
        }
    </script>
</body>
</html>
