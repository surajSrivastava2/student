<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Hub Pro</title>
    <style>
        :root { --primary: #4a90e2; --secondary: #2c3e50; --success: #27ae60; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, 
<body>

    <div id="auth-container" class="card">sans-serif; background: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        #app { display: none; max-width: 800px; width: 90%; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.3s; margin-top: 10px; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        .nav-menu { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .nav-menu button { flex: 1; font-size: 0.9rem; background: var(--secondary); }
        .module { display: none; background: #fff; padding: 20px; border-radius: 10px; border: 1px solid #eee; }
        .active-module { display: block; }
        #chatBox { height: 250px; overflow-y: auto; border: 1px solid #eee; padding: 10px; text-align: left; margin-bottom: 10px; background: #fafafa; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border: 1px solid #eee; text-align: left; }
        th { background: var(--primary); color: white; }
    </style>
</head>
        <div id="login-form">
            <h2>Student Login</h2>
            <input type="email" id="email" placeholder="Email Address">
            <input type="password" id="pass" placeholder="Password">
            <button onclick="handleLogin()">Sign In</button>
            <p style="margin-top:15px; font-size:0.9rem;">New student? <span onclick="toggleAuth(true)" style="color:var(--primary); cursor:pointer;">Register here</span></p>
        </div>

        <div id="signup-form" style="display:none;">
            <h2>Student Registration</h2>
            <input type="text" id="newName" placeholder="Full Name">
            <input type="email" id="newEmail" placeholder="Email Address">
            <input type="password" id="newPass" placeholder="Password">
            <button onclick="handleSignup()" style="background:var(--success);">Create Account</button>
            <p style="margin-top:15px; font-size:0.9rem;">Already have an account? <span onclick="toggleAuth(false)" style="color:var(--primary); cursor:pointer;">Login</span></p>
        </div>
    </div>

    <div id="app" class="card">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 id="welcomeMsg">Welcome!</h2>
            <button onclick="location.reload()" style="width:auto; background:var(--danger); padding:8px 15px;">Logout</button>
        </div>

        <div class="nav-menu">
            <button onclick="showModule('attendance')">📅 Attendance</button>
            <button onclick="showModule('tutor')">🤖 AI Tutor</button>
            <button onclick="showModule('quiz')">📝 Quiz</button>
        </div>

        <div id="attendance" class="module active-module">
            <h3>Current Attendance</h3>
            <table id="attTable"><tr><td>Loading records...</td></tr></table>
        </div>

        <div id="tutor" class="module">
            <h3>AI Study Companion</h3>
            <div id="chatBox"></div>
            <div style="display:flex; gap:5px;">
                <input type="text" id="aiInput" placeholder="Ask a question...">
                <button onclick="askAI()" style="width:80px; margin:10px 0;">Send</button>
            </div>
        </div>

        <div id="quiz" class="module">
            <h3>Interactive Quiz</h3>
            <div id="quizContainer">
                <p>Ready to test your knowledge?</p>
                <button onclick="startQuiz()">Start Quiz</button>
            </div>
        </div>
    </div>

<script>
    // Ye tumhara Render ka address hai
    const BASE_URL = "https://student-ygb9.onrender.com/api"; 

    // 1. SIGNUP FUNCTION
    async function signup() {
        const name = document.getElementById('newName').value;
        const email = document.getElementById('newEmail').value;
        const password = document.getElementById('newPass').value;

        try {
            const res = await fetch(`${BASE_URL}/signup`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name, email, password })
            });
            const data = await res.json();
            alert(data.message);
            if(data.success) {
                // Agar signup ho jaye toh login panel dikhao (agar banaya hai toh)
                console.log("User registered!");
            }
        } catch (err) {
            alert("Backend connected nahi hai. URL check karo!");
        }
    }

    // 2. LOGIN FUNCTION
    async function login() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('pass').value;

        try {
            const res = await fetch(`${BASE_URL}/login`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            if(data.success) { 
                localStorage.setItem('user', JSON.stringify(data.user));
                alert("Login Successful! Redirecting...");
                window.location.href = "dashboard.html"; // Dashboard par bhej do
            } else { 
                alert(data.message); 
            }
        } catch (err) {
            alert("Server error! Backend check karo.");
        }
    }

    // 3. QUIZ GENERATOR FUNCTION
    async function getQuiz() {
        const topic = document.getElementById('quizTopic').value;
        const display = document.getElementById('quizDisplay');

        if(!topic) return alert("Topic daalo bhai!");
        display.innerText = "AI is thinking... 🧠";

        try {
            const res = await fetch(`${BASE_URL}/quiz`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ topic })
            });
            const data = await res.json();
            display.innerText = data.quiz;
        } catch (err) {
            display.innerText = "Quiz generate nahi ho paya.";
        }
    }
</script>
</body>
</html>
