
<script>
// 1. NAVIGATION (Sabse pehle ye taaki buttons turant kaam karein)
function showSignup() {
    document.getElementById("login").style.display = "none";
    document.getElementById("signup").style.display = "flex";
}

function showLogin() {
    document.getElementById("signup").style.display = "none";
    document.getElementById("login").style.display = "flex";
}

function openModule(name) {
    document.querySelectorAll(".module").forEach(m => m.classList.remove("active"));
    const target = document.getElementById(name);
    if(target) target.classList.add("active");
}

function logout() { location.reload(); }

// 2. LOGIN (Backend Se Connected)
async function login() {
    const email = document.getElementById("loginEmail").value;
    const password = document.getElementById("loginPassword").value;

    if(!email || !password) return alert("Bhai, details toh daalo!");

    try {
        const res = await fetch("https://student-ygb9.onrender.com/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        
        if (data.success) {
            localStorage.setItem("userId", data.user.id);
            document.getElementById("login").style.display = "none";
            document.getElementById("app").style.display = "flex";
            loadAttendance(); // Login hote hi attendance load hogi
        } else {
            alert(data.message);
        }
    } catch (err) {
        alert("Server Connecting... Ek baar fir try karo (Cold Start)");
    }
}

// 3. SIGNUP
async function signup() {
    const name = document.getElementById("signupName").value;
    const email = document.getElementById("signupEmail").value;
    const password = document.getElementById("signupPassword").value;

    try {
        const res = await fetch("https://student-ygb9.onrender.com/api/signup", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, email, password })
        });
        const data = await res.json();
        alert(data.message);
        if(data.success) showLogin();
    } catch (e) { alert("Signup Error!"); }
}

// 4. ATTENDANCE (Live Fetch)
async function loadAttendance() {
    const table = document.getElementById("attendanceTable");
    table.innerHTML = "<tr><td colspan='2'>Loading...</td></tr>";
    
    try {
        const res = await fetch("https://student-ygb9.onrender.com/api/attendance");
        const data = await res.json();
        let html = "<tr><th>Subject</th><th>Percent</th></tr>";
        data.forEach(a => {
            html += `<tr><td>${a.subject}</td><td>${a.percent}%</td></tr>`;
        });
        table.innerHTML = html;
    } catch (e) {
        table.innerHTML = "<tr><td>Math</td><td>85% (Demo)</td></tr>";
    }
}

// 5. CHAT (AI Tutor)
async function sendMessage() {
    const input = document.getElementById("message");
    const chat = document.getElementById("chat");
    if(!input.value) return;

    chat.innerHTML += `<div class="msg user">${input.value}</div>`;
    const userMsg = input.value;
    input.value = "";

    try {
        const res = await fetch("https://student-ygb9.onrender.com/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: userMsg })
        });
        const data = await res.json();
        chat.innerHTML += `<div class="msg">${data.reply}</div>`;
    } catch (e) {
        chat.innerHTML += `<div class="msg">AI is currently offline.</div>`;
    }
}
</script>
